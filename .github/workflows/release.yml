name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build plugin ZIP
        run: |
          mkdir -p build/fsnw-key-management
          rsync -a --exclude-from='.distignore' ./ build/fsnw-key-management/
          (cd build && zip -r fsnw-key-management.zip fsnw-key-management)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/fsnw-key-management.zip
          generate_release_notes: true
